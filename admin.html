<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · NNB Blog</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">NNB</a>
      <ul class="nav-links">
        <li><a href="index.html">Public site</a></li>
        <li><a class="active" href="admin.html">Admin</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <section class="section">
      <h1 class="page-title">Blog <span>Admin</span></h1>
      <div class="card">
        <label for="token">Admin token</label>
        <input class="input" id="token" placeholder="x-admin-token" value="change-me-in-production" />

        <label for="title">Title</label>
        <input class="input" id="title" />

        <label for="summary">Summary</label>
        <input class="input" id="summary" />

        <label for="type">Type</label>
        <input class="input" id="type" value="Essay" />

        <label for="publishedAt">Published At</label>
        <input class="input" id="publishedAt" type="datetime-local" />

        <label for="content">Content</label>
        <textarea class="textarea" id="content" rows="8"></textarea>

        <div class="stack" style="margin-top:1rem">
          <button class="button" id="saveBtn" type="button">Save post</button>
          <button class="button" id="clearBtn" type="button">Clear form</button>
          <button class="button" id="refreshBtn" type="button">Refresh list</button>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-title"><h2>Existing Posts</h2></div>
      <div id="rows" class="posts-list"></div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    let editingId = null;

    function currentPayload() {
      return {
        title: $('title').value.trim(),
        summary: $('summary').value.trim(),
        content: $('content').value.trim(),
        type: $('type').value.trim() || 'Note',
        publishedAt: $('publishedAt').value
          ? new Date($('publishedAt').value).toISOString()
          : new Date().toISOString(),
      };
    }

    function clearForm() {
      editingId = null;
      $('title').value = '';
      $('summary').value = '';
      $('content').value = '';
      $('type').value = 'Essay';
      $('publishedAt').value = '';
      $('saveBtn').textContent = 'Save post';
    }

    async function fetchAllPosts() {
      const res = await fetch('/api/posts?all=1');
      if (!res.ok) throw new Error('Unable to load posts');
      return res.json();
    }

    function authHeaders() {
      return {
        'Content-Type': 'application/json',
        'x-admin-token': $('token').value.trim(),
      };
    }

    function startEdit(post) {
      editingId = post.id;
      $('title').value = post.title || '';
      $('summary').value = post.summary || '';
      $('content').value = post.content || '';
      $('type').value = post.type || 'Note';
      if (post.publishedAt) {
        $('publishedAt').value = new Date(post.publishedAt).toISOString().slice(0, 16);
      }
      $('saveBtn').textContent = 'Update post';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function renderRows() {
      const root = $('rows');
      root.innerHTML = '<div class="card">Loading...</div>';

      try {
        const posts = await fetchAllPosts();
        if (!posts.length) {
          root.innerHTML = '<div class="card">No posts yet.</div>';
          return;
        }

        root.innerHTML = posts
          .map(
            (post, i) => `
            <div class="post-row" style="grid-template-columns:70px 1fr auto auto">
              <div class="num">${String(i + 1).padStart(3, '0')}</div>
              <div>
                <p class="post-title">${post.title}</p>
                <p class="post-summary">${post.summary || ''}</p>
              </div>
              <button class="button" onclick='window.__edit(${JSON.stringify(post)})'>Edit</button>
              <button class="button" onclick='window.__del("${post.id}")'>Delete</button>
            </div>
          `,
          )
          .join('');
      } catch (error) {
        root.innerHTML = `<div class="card">${error.message}</div>`;
      }
    }

    async function savePost() {
      const payload = currentPayload();
      if (!payload.title) {
        alert('Title is required');
        return;
      }

      const url = editingId ? `/api/posts/${editingId}` : '/api/posts';
      const method = editingId ? 'PUT' : 'POST';

      const res = await fetch(url, {
        method,
        headers: authHeaders(),
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        alert(`Request failed (${res.status})`);
        return;
      }

      clearForm();
      await renderRows();
    }

    async function deletePost(id) {
      const res = await fetch(`/api/posts/${id}`, {
        method: 'DELETE',
        headers: { 'x-admin-token': $('token').value.trim() },
      });

      if (!res.ok) {
        alert(`Delete failed (${res.status})`);
        return;
      }

      if (editingId === id) clearForm();
      await renderRows();
    }

    window.__edit = startEdit;
    window.__del = deletePost;

    $('saveBtn').addEventListener('click', savePost);
    $('clearBtn').addEventListener('click', clearForm);
    $('refreshBtn').addEventListener('click', renderRows);

    renderRows();
  </script>
</body>
</html>
